  <circle cx="235" cy="100" r="5" fill-opacity="0.6" style="fill:rgb(247, 168, 196);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="165" cy="220" r="5" fill-opacity="0.6" style="fill:rgb(247, 168, 196);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Connexions lignes noeuds → centre (synapse IA) -->
  <line x1="263" y1="160" x2="212" y2="160" stroke="#e080a8" stroke-width="0.8" fill="none" opacity="0.5" style="fill:none;stroke:rgb(224, 128, 168);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="137" y1="160" x2="188" y2="160" stroke="#e080a8" stroke-width="0.8" fill="none" opacity="0.5" style="fill:none;stroke:rgb(224, 128, 168);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="230" y1="214" x2="206" y2="170" stroke="#e080a8" stroke-width="0.8" fill="none" opacity="0.5" style="fill:none;stroke:rgb(224, 128, 168);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="170" y1="106" x2="194" y2="150" stroke="#e080a8" stroke-width="0.8" fill="none" opacity="0.5" style="fill:none;stroke:rgb(224, 128, 168);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Petits arcs décoratifs autour du noyau (forme neuronale) -->
  <path d="M 188 140 Q 200 128 212 140" fill="none" stroke="#f5b8d0" stroke-width="1.5" stroke-linecap="round" style="fill:none;stroke:rgb(245, 184, 208);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M 185 175 Q 200 188 215 175" fill="none" stroke="#f5b8d0" stroke-width="1.5" stroke-linecap="round" style="fill:none;stroke:rgb(245, 184, 208);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M 178 152 Q 165 160 178 168" fill="none" stroke="#f5b8d0" stroke-width="1.2" stroke-linecap="round" style="fill:none;stroke:rgb(245, 184, 208);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M 222 152 Q 235 160 222 168" fill="none" stroke="#f5b8d0" stroke-width="1.2" stroke-linecap="round" style="fill:none;stroke:rgb(245, 184, 208);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- ======= TEXTE DROIT ======= -->
  <!-- "Omni" -->
  <text x="320" y="148" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="700" letter-spacing="-1" dominant-baseline="auto" style="fill:rgb(247, 168, 196);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:64px;font-weight:700;text-anchor:start;dominant-baseline:auto">Omni</text>

  <!-- "AI" en accent différent -->
  <text x="500" y="148" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="700" font-style="italic" dominant-baseline="auto" style="fill:rgb(224, 96, 144);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:64px;font-weight:700;font-style:italic;text-anchor:start;dominant-baseline:auto">AI</text>

  <!-- Ligne décorative sous le nom -->
  <rect x="320" y="158" width="218" height="2.5" rx="1.5" fill-opacity="0.35" style="fill:rgb(224, 96, 144);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Tagline -->
  <text x="320" y="188" font-family="'Trebuchet MS', Arial, sans-serif" font-size="14" letter-spacing="3.5" dominant-baseline="auto" style="fill:rgb(212, 138, 170);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Trebuchet MS&quot;, Arial, sans-serif;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">PLATFORM · SaaS · IA</text>

  <!-- Petit point décoratif accent -->
  <circle cx="316" cy="148" r="5" style="fill:rgb(224, 96, 144);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

